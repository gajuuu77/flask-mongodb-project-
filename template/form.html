<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>
<body>

<h2>Enter Student Data</h2>

<form method="POST" action="/submit">
    Name: <input type="text" name="name"><br><br>
    Age: <input type="number" name="age"><br><br>
    <button type="submit">Submit</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

</body>
</html>
